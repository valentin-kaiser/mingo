<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mingo – Mathe Bingo</title>
  <meta name="color-scheme" content="dark light">
  <link rel="icon" type="image/png" href="/assets/icon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/icon/favicon.svg" />
  <link rel="shortcut icon" href="/assets/icon/favicon.ico" />

  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true"><span>M</span></div>
      <div>
        <h1>Mingo</h1>
        <div class="subtitle">Bingo – Kleines Einmaleins & Grundrechenarten</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn ghost" id="openSettings" aria-haspopup="dialog" aria-controls="settingsDialog">⚙️
        Einstellungen</button>
      <button class="btn danger" id="resetBtn" title="Alle gespeicherten Aufgaben löschen">Zurücksetzen</button>
    </div>
  </header>

  <main class="stage" aria-live="polite">
    <section class="board" aria-labelledby="aufgabe-head">
      <h2 id="aufgabe-head" class="visually-hidden"
        style="position:absolute; left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Aktuelle Aufgabe</h2>
      <div>
        <div id="expression" class="expression placeholder">? × ?</div>
      </div>
    </section>

    <section class="buzzer-wrap">
      <button id="bingoBtn" class="buzzer" aria-label="Bingo – Lösungen zeigen" disabled>BINGO!</button>
    </section>

    <section class="controls" id="controls">
      <button class="btn primary" id="nextBtn">Weiter ➜</button>
      <button class="btn ghost" id="hideSolutionsBtn" hidden>Lösungen ausblenden</button>
    </section>

    <div id="note" class="note">Noch keine Aufgaben. Klicke „Weiter“, um die erste zu erstellen.</div>

    <section class="list" id="listWrap" aria-label="Aufgabenliste">
    </section>
  </main>

  <footer>Speichert Aufgaben lokal im Browser. Drücke <strong>Enter</strong> für „Weiter“.</footer>

  <dialog id="settingsDialog" aria-labelledby="settingsTitle">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <h3 id="settingsTitle" style="margin:0;">Einstellungen</h3>
        <button class="btn ghost" id="closeSettings" aria-label="Einstellungen schließen">✖</button>
      </div>

      <div class="settings" style="margin-top:8px;">
        <div class="row" aria-label="Operationen">
          <label class="chip"><input type="checkbox" id="opAdd" checked> Addition (+)</label>
          <label class="chip"><input type="checkbox" id="opSub" checked> Subtraktion (−)</label>
          <label class="chip"><input type="checkbox" id="opMul" checked> Multiplikation (×)</label>
          <label class="chip"><input type="checkbox" id="opDiv" checked> Division (÷)</label>
        </div>
        <div class="row range">
          <span class="chip">Zahlenbereich: <strong id="rangeLabel">1–10</strong></span>
          <input type="range" id="rangeMax" min="5" max="100" step="5" value="10" />
          <label class="chip"><input type="checkbox" id="smallTimes" /> Nur kleines Einmaleins (1–10 × 1–10)</label>
        </div>
        <div class="row">
          <label class="chip"><input type="checkbox" id="noNegatives" checked /> Keine negativen Ergebnisse</label>
          <label class="chip"><input type="checkbox" id="wholeDivision" checked /> Division nur mit ganzzahligem
            Ergebnis</label>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:14px;">
        <button class="btn ghost" id="cancelSettings">Abbrechen</button>
        <button class="btn primary" id="saveSettings">OK</button>
      </div>
    </div>
  </dialog>

  <div class="celebration" id="celebration" aria-hidden="true"></div>

  <script src="/dist/main.js" defer></script>
</body>

</html>
